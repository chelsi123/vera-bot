# Render deployment config. Render reads this automatically when you create a
# Blueprint from the repo. Free plan, permanent URL, no credit card required.
services:
  - type: web
    name: vera-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn bot:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /v1/healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Optional: set this in the Render dashboard (not here) to enable Claude
      # composition. Without it the bot uses the deterministic template engine.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TEAM_NAME
        value: "Team Vera"
      - key: CONTACT_EMAIL
        value: "chelsisinghal1362@gmail.com"
