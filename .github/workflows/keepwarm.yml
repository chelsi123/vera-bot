name: keep-warm

# Pings the deployed bot so Render's free instance never spins down.
# Runs from GitHub's servers (your laptop can be off).
on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub may delay a few min)
  workflow_dispatch:          # lets you run it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping healthz
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -m 90 https://vera-bot-eo0m.onrender.com/v1/healthz || echo "000")
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 10
          done
          echo "warning: bot did not return 200 after retries"
